site_name: Spine
site_description: A lightweight, modular, protocol-native runtime for production AI agents.
site_url: https://spine.dev/
repo_url: https://github.com/spine/spine
repo_name: spine/spine
copyright: Apache-2.0

theme:
  name: material
  custom_dir: overrides
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  icon:
    repo: fontawesome/brands/github
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.top
    - navigation.footer
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/spine/spine

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

plugins:
  - search
  - markdown-exec
  - mkdocstrings:
      handlers:
        python:
          paths:
            - packages/spine-core/src
            - packages/spine-middleware/src
            - packages/spine-backends/src
            - packages/spine-providers/src
            - packages/spine-eval/src
            - packages/spine-orchestration/src
            - packages/spine-mcp/src
            - packages/spine-a2a/src
            - packages/spine-otel/src
          options:
            show_root_heading: true
            show_source: true
            members_order: source
            docstring_style: google
            separate_signature: true
            show_signature_annotations: true

nav:
  - Home: index.md
  - Getting started:
      - Installation: install.md
      - Quickstart: quickstart.md
  - Concepts:
      - The kernel: concepts/kernel.md
      - State & checkpoints: concepts/state.md
      - Guards: concepts/guards.md
      - Middleware: concepts/middleware.md
      - Tools: concepts/tools.md
      - Providers & models: concepts/providers.md
      - Human-in-the-loop: concepts/hitl.md
      - Tracing, streaming & replay: concepts/observability.md
  - Guides:
      - Models & any provider: guides/models.md
      - Multi-agent & sub-agents: guides/orchestration.md
      - Memory: guides/memory.md
      - MCP tools: guides/mcp.md
      - Evaluation: guides/eval.md
      - Guardrails & safety: guides/guardrails.md
      - Deployment & scale: guides/deployment.md
      - Patterns & edge cases: guides/patterns.md
  - Cookbook: guides/examples.md
  - Deep dives:
      - Evaluation: deepdive/eval.md
      - MCP: deepdive/mcp.md
  - Extending & contributing:
      - Contributing: contributing.md
      - Build a middleware: develop/middleware.md
      - Build a provider: develop/provider.md
      - Build a backend: develop/backend.md
      - Publish a plugin: develop/publish.md
  - Reference:
      - Data model & wire shapes: reference/data-model.md
      - Middleware catalog: reference/middleware.md
      - CLI: reference/cli.md
      - Plugin authoring: reference/plugins.md
      - API reference: reference/api.md
  - Architecture: architecture.md
