[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spine-otel"
version = "0.1.0"
description = "OpenTelemetry middleware for Spine — one span tree per run."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Spine" }]
dependencies = [
    "spine-core",
    "opentelemetry-api>=1.27",
    "opentelemetry-sdk>=1.27",
]

[project.optional-dependencies]
# OTLP-over-HTTP exporter, for shipping to a collector / Grafana / Datadog.
otlp = ["opentelemetry-exporter-otlp-proto-http>=1.27"]

[project.entry-points."spine.plugins"]
otel = "spine_otel.middleware:OTelMiddleware"

[tool.hatch.build.targets.wheel]
packages = ["src/spine_otel"]

[tool.uv.sources]
spine-core = { workspace = true }
