[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spine-backends"
version = "0.1.0"
description = "Durable storage backends for Spine (SQLite checkpoint, …)."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Spine" }]
dependencies = [
    "spine-core",
    "anyio>=4.4",
]

[project.optional-dependencies]
redis = ["redis>=5.0"]
postgres = ["asyncpg>=0.29"]

[project.entry-points."spine.plugins"]
backend_sqlite = "spine_backends:SQLiteCheckpoint"
backend_redis = "spine_backends:RedisCheckpoint"
backend_postgres = "spine_backends:PostgresCheckpoint"
memory_vector = "spine_backends:InMemoryVectorMemory"
memory_buffer = "spine_backends:BufferMemory"
memory_pgvector = "spine_backends:PgVectorMemory"

[tool.hatch.build.targets.wheel]
packages = ["src/spine_backends"]

[tool.uv.sources]
spine-core = { workspace = true }
