[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spine-cli"
version = "0.1.0"
description = "Spine command-line interface: scaffold, run, doctor, plugins."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Spine" }]
dependencies = [
    "spine-core",
    "typer>=0.12",
    "rich>=13.7",
]

[project.scripts]
spine = "spine_cli.app:app"

[tool.hatch.build.targets.wheel]
packages = ["src/spine_cli"]

[tool.uv.sources]
spine-core = { workspace = true }
