[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spine-mcp"
version = "0.1.0"
description = "MCP (Model Context Protocol) client adapter for Spine."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Spine" }]
dependencies = [
    "spine-core",
    "mcp>=1.2",
]

[tool.hatch.build.targets.wheel]
packages = ["src/spine_mcp"]

[tool.uv.sources]
spine-core = { workspace = true }
