[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spine-a2a"
version = "0.1.0"
description = "A2A (agent-to-agent) protocol adapter for Spine."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Spine" }]
dependencies = [
    "spine-core",
    "httpx>=0.27",
]

[tool.hatch.build.targets.wheel]
packages = ["src/spine_a2a"]

[tool.uv.sources]
spine-core = { workspace = true }
