[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spine-middleware"
version = "0.1.0"
description = "Spine V1 middleware suite: retry, fallback, loop guard, cost, compaction, structured output."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Spine" }]
dependencies = [
    "spine-core",
    "anyio>=4.4",
]

[project.entry-points."spine.plugins"]
# Targets resolve through the package __init__, which registers every name.
mw_retry = "spine_middleware:Retry"
mw_fallback = "spine_middleware:ModelFallback"
mw_loopguard = "spine_middleware:LoopGuard"
mw_cost = "spine_middleware:CostTracking"
mw_compaction = "spine_middleware:Compaction"
mw_cache = "spine_middleware:Cache"
mw_pii = "spine_middleware:PIIRedaction"
mw_injection = "spine_middleware:PromptInjectionScreen"
mw_content_policy = "spine_middleware:ContentPolicy"
mw_circuit_breaker = "spine_middleware:CircuitBreaker"
mw_rate_limit = "spine_middleware:RateLimit"
mw_idempotency = "spine_middleware:Idempotency"
mw_tool_timeout = "spine_middleware:ToolTimeout"
mw_tool_truncation = "spine_middleware:ToolOutputTruncation"

[tool.hatch.build.targets.wheel]
packages = ["src/spine_middleware"]

[tool.uv.sources]
spine-core = { workspace = true }
