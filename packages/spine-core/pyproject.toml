[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spine-core"
version = "0.1.0"
description = "Spine kernel: the tiny, protocol-native runtime for production AI agents."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Spine" }]
keywords = ["ai", "agents", "llm", "runtime", "kernel"]
dependencies = [
    "pydantic>=2.7",
    "anyio>=4.4",
]

[project.urls]
Homepage = "https://github.com/spine/spine"

[tool.hatch.build.targets.wheel]
packages = ["src/spine_core"]
