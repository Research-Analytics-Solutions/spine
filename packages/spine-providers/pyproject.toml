[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spine-providers"
version = "0.1.0"
description = "Model provider adapters for Spine (Anthropic, OpenAI, …)."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
authors = [{ name = "Spine" }]
dependencies = [
    "spine-core",
    "anthropic>=0.40",
    "openai>=1.40",
]

[project.entry-points."spine.plugins"]
# Lazy discovery: spine doctor / CLI enumerate these; importing the package
# also eagerly registers the scheme for convenience.
anthropic = "spine_providers.anthropic:AnthropicProvider"
openai = "spine_providers.openai:OpenAIProvider"

[tool.hatch.build.targets.wheel]
packages = ["src/spine_providers"]

[tool.uv.sources]
spine-core = { workspace = true }
