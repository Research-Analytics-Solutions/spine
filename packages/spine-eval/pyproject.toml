[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "spine-eval"
version = "0.1.0"
description = "Eval harness for Spine — datasets, scorers, and Cost/Latency/Efficacy/Reliability reports."
readme = "README.md"
requires-python = ">=3.12"
license = "MIT"
authors = [{ name = "Spine" }]
dependencies = [
    "spine-core",
    "anyio>=4.4",
    "pyyaml>=6.0",
]

[tool.hatch.build.targets.wheel]
packages = ["src/spine_eval"]

[tool.uv.sources]
spine-core = { workspace = true }
